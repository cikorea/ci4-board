openapi: 3.0.3
info:
  title: CI4 Board API
  version: 2.0.0
  description: |
    CodeIgniter 4 기반 헤드리스 게시판 REST API

    ## 인증
    로그인 후 발급된 `access_token`을 `Authorization: Bearer {token}` 헤더로 전달합니다.

    ## 기본 응답 형식
    ```json
    { "success": true,  "data": {},   "message": "" }
    { "success": false, "data": null, "message": "에러 메시지" }
    ```

    ## API 구조
    | 경로 접두사 | 설명 | 인증 |
    |------------|------|------|
    | `/api/v1/*` | 사용자·게시판·쪽지·CMS | JWT (일부 공개) |
    | `/api/admin/v1/*` | 관리자 전용 | Admin JWT (role: superadmin/manager) |

servers:
  - url: http://localhost:8080
    description: 개발 서버

tags:
  # 사용자 API
  - name: Auth
    description: 사용자 인증 (`/api/v1/auth/*`)
  - name: Social Auth
    description: 소셜 로그인 OAuth2 (`/api/v1/auth/social/*`)
  - name: Board
    description: 게시판 조회 (`/api/v1/boards/*`)
  - name: Article
    description: 게시글 CRUD (`/api/v1/boards/{id}/articles/*`)
  - name: Comment
    description: 댓글 CRUD (`/api/v1/boards/{id}/articles/{id}/comments/*`)
  - name: File
    description: 파일 업로드·다운로드 (`/api/v1/files/*`)
  - name: Message
    description: 쪽지 (`/api/v1/messages/*`)
  - name: Config
    description: 사이트 공개 설정 (`/api/v1/config`)
  - name: CMS
    description: CMS 공개 조회 (`/api/v1/cms/*`)
  # 관리자 API
  - name: Admin Auth
    description: 관리자 인증 (`/api/admin/v1/auth/*`)
  - name: Admin Board
    description: 게시판 관리 (`/api/admin/v1/boards/*`)
  - name: Admin Member
    description: 회원 관리 (`/api/admin/v1/members/*`)
  - name: Admin Article
    description: 게시글 관리 (`/api/admin/v1/articles/*`)
  - name: Admin Setting
    description: 사이트 설정 (`/api/admin/v1/setting`)
  - name: Admin Stats
    description: 일별 통계 (`/api/admin/v1/stats`)
  - name: Admin Log
    description: 감사 로그 (`/api/admin/v1/logs`)
  - name: Admin Notice
    description: 관리자 공지 (`/api/admin/v1/notices`)
  - name: Admin CMS
    description: CMS 관리 (`/api/admin/v1/cms/*`)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
        message:
          type: string
          nullable: true

    TokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                access_token:
                  type: string
                  example: eyJ0eXAiOiJKV1Qi...
                refresh_token:
                  type: string
                token_type:
                  type: string
                  example: Bearer
                expires_in:
                  type: integer
                  example: 3600
                user:
                  $ref: '#/components/schemas/UserSummary'

    AdminTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                access_token:
                  type: string
                refresh_token:
                  type: string
                token_type:
                  type: string
                  example: Bearer
                expires_in:
                  type: integer
                  example: 3600
                user:
                  $ref: '#/components/schemas/AdminUserSummary'

    UserSummary:
      type: object
      properties:
        idx:
          type: integer
        user_id:
          type: string
        nickname:
          type: string
        email:
          type: string
        group_idx:
          type: integer
        group_name:
          type: string

    AdminUserSummary:
      type: object
      properties:
        idx:
          type: integer
        user_id:
          type: string
        nickname:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [superadmin, manager]
          example: superadmin

    Article:
      type: object
      properties:
        idx:
          type: integer
        bbs_idx:
          type: integer
        title:
          type: string
        contents:
          type: string
        comment_count:
          type: integer
        hit_count:
          type: integer
        timestamp_insert:
          type: integer
        nickname:
          type: string

    Comment:
      type: object
      properties:
        idx:
          type: integer
        article_idx:
          type: integer
        comment:
          type: string
        nickname:
          type: string
        timestamp_insert:
          type: integer

    Message:
      type: object
      properties:
        idx:
          type: integer
        sender_user_idx:
          type: integer
        receiver_user_idx:
          type: integer
        title:
          type: string
        contents:
          type: string
        is_read:
          type: integer
        timestamp_insert:
          type: integer

    AdminLog:
      type: object
      properties:
        idx:
          type: integer
        admin_idx:
          type: integer
        action:
          type: string
          example: board.update
        target_table:
          type: string
          nullable: true
        target_idx:
          type: integer
          nullable: true
        before_data:
          type: string
          nullable: true
        after_data:
          type: string
          nullable: true
        client_ip:
          type: string
        timestamp:
          type: integer

    AdminNotice:
      type: object
      properties:
        idx:
          type: integer
        title:
          type: string
        contents:
          type: string
          nullable: true
        author_idx:
          type: integer
        is_pinned:
          type: integer
          enum: [0, 1]
        timestamp_insert:
          type: integer

    StatDaily:
      type: object
      properties:
        idx:
          type: integer
        stat_date:
          type: string
          format: date
          example: '2026-06-01'
        new_users:
          type: integer
        new_articles:
          type: integer
        new_comments:
          type: integer
        total_hits:
          type: integer
        active_users:
          type: integer

    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer

  responses:
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            data: null
            message: 인증이 필요합니다.
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    ValidationError:
      description: 유효성 검사 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

# ================================================================
# PATHS
# ================================================================
paths:

  # ────────────────────────────────────────────────────────────────
  # 사용자 인증
  # ────────────────────────────────────────────────────────────────

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login_id, password]
              properties:
                login_id:
                  type: string
                  example: testuser
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: 로그인 성공 → JWT 발급
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: 잘못된 자격증명
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, nickname, email, password, password2]
              properties:
                user_id:
                  type: string
                nickname:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                password2:
                  type: string
      responses:
        '201':
          description: 회원가입 성공
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 로그아웃 성공
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 액세스 토큰 갱신
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 토큰 갱신 성공
        '401':
          description: 유효하지 않은 Refresh Token

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 내 정보 조회
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 사용자 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/profile:
    put:
      tags: [Auth]
      summary: 프로필 수정
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                email:
                  type: string
      responses:
        '200':
          description: 수정 완료
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/withdraw:
    delete:
      tags: [Auth]
      summary: 회원 탈퇴
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 탈퇴 완료
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ────────────────────────────────────────────────────────────────
  # 소셜 로그인
  # ────────────────────────────────────────────────────────────────

  /api/v1/auth/social/google:
    get:
      tags: [Social Auth]
      summary: Google OAuth2 인증 시작
      responses:
        '302':
          description: Google 인증 페이지로 리다이렉트

  /api/v1/auth/social/google/callback:
    get:
      tags: [Social Auth]
      summary: Google OAuth2 콜백
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 소셜 로그인 성공 → JWT 발급
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/auth/social/naver:
    get:
      tags: [Social Auth]
      summary: 네이버 OAuth2 인증 시작
      responses:
        '302':
          description: 네이버 인증 페이지로 리다이렉트

  /api/v1/auth/social/naver/callback:
    get:
      tags: [Social Auth]
      summary: 네이버 OAuth2 콜백
      responses:
        '200':
          description: 소셜 로그인 성공 → JWT 발급

  /api/v1/auth/social/kakao:
    get:
      tags: [Social Auth]
      summary: 카카오 OAuth2 인증 시작
      responses:
        '302':
          description: 카카오 인증 페이지로 리다이렉트

  /api/v1/auth/social/kakao/callback:
    get:
      tags: [Social Auth]
      summary: 카카오 OAuth2 콜백
      responses:
        '200':
          description: 소셜 로그인 성공 → JWT 발급

  # ────────────────────────────────────────────────────────────────
  # 게시판
  # ────────────────────────────────────────────────────────────────

  /api/v1/boards:
    get:
      tags: [Board]
      summary: 게시판 목록
      responses:
        '200':
          description: 게시판 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/boards/{bbsId}:
    get:
      tags: [Board]
      summary: 게시판 상세
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
            example: free
      responses:
        '200':
          description: 게시판 정보
        '404':
          $ref: '#/components/responses/NotFound'

  # ────────────────────────────────────────────────────────────────
  # 게시글
  # ────────────────────────────────────────────────────────────────

  /api/v1/boards/{bbsId}/articles:
    get:
      tags: [Article]
      summary: 게시글 목록
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: 게시글 목록
    post:
      tags: [Article]
      summary: 게시글 작성
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, contents]
              properties:
                title:
                  type: string
                contents:
                  type: string
                is_secret:
                  type: integer
                  enum: [0, 1]
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: 게시글 작성 완료
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/boards/{bbsId}/articles/{idx}:
    get:
      tags: [Article]
      summary: 게시글 상세
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 게시글 상세
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Article]
      summary: 게시글 수정 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, contents]
              properties:
                title:
                  type: string
                contents:
                  type: string
      responses:
        '200':
          description: 수정 완료
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Article]
      summary: 게시글 삭제 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료
        '403':
          $ref: '#/components/responses/Forbidden'

  # ────────────────────────────────────────────────────────────────
  # 댓글
  # ────────────────────────────────────────────────────────────────

  /api/v1/boards/{bbsId}/articles/{articleIdx}/comments:
    get:
      tags: [Comment]
      summary: 댓글 목록
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 댓글 목록
    post:
      tags: [Comment]
      summary: 댓글 작성
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: string
      responses:
        '201':
          description: 댓글 작성 완료
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/boards/{bbsId}/articles/{articleIdx}/comments/{commentIdx}:
    put:
      tags: [Comment]
      summary: 댓글 수정 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
        - name: commentIdx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: 수정 완료
    delete:
      tags: [Comment]
      summary: 댓글 삭제 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
        - name: commentIdx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료

  # ────────────────────────────────────────────────────────────────
  # 파일
  # ────────────────────────────────────────────────────────────────

  /api/v1/files:
    post:
      tags: [File]
      summary: 파일 업로드
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [bbs_idx, article_idx]
              properties:
                bbs_idx:
                  type: integer
                article_idx:
                  type: integer
                attachments:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 최대 5개, 2MB/개
      responses:
        '201':
          description: 업로드 결과
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: 허용되지 않는 파일

  /api/v1/files/{idx}/download:
    get:
      tags: [File]
      summary: 파일 다운로드 (인증 불필요)
      parameters:
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 파일 스트림
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/files/{idx}:
    delete:
      tags: [File]
      summary: 파일 삭제 (소유자만)
      security:
        - BearerAuth: []
      parameters:
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/files/wysiwyg:
    post:
      tags: [File]
      summary: WYSIWYG 이미지 업로드
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: jpg·png·gif·webp, 5MB 이하
      responses:
        '200':
          description: 이미지 URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      url:
                        type: string

  # ────────────────────────────────────────────────────────────────
  # 쪽지
  # ────────────────────────────────────────────────────────────────

  /api/v1/messages/inbox:
    get:
      tags: [Message]
      summary: 받은 쪽지함
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: 받은 쪽지 목록
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/messages/sent:
    get:
      tags: [Message]
      summary: 보낸 쪽지함
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 보낸 쪽지 목록

  /api/v1/messages:
    post:
      tags: [Message]
      summary: 쪽지 보내기
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, contents]
              properties:
                to:
                  type: string
                  description: 수신자 user_id 또는 nickname
                title:
                  type: string
                contents:
                  type: string
      responses:
        '201':
          description: 발송 완료
        '404':
          description: 수신자 없음
        '422':
