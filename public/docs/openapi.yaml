  -
    name: Message
    description: '쪽지 (`/api/v1/messages/*`)'
  -
    name: Config
    description: '사이트 공개 설정 (`/api/v1/config`)'
  -
    name: CMS
    description: 'CMS 공개 조회 (`/api/v1/cms/*`)'
  -
    name: AdminArticle
    description: AdminArticle
  -
    name: AdminAuth
    description: AdminAuth
  -
    name: AdminBoard
    description: AdminBoard
  -
    name: AdminCMS
    description: AdminCMS
  -
    name: AdminFileLibrary
    description: AdminFileLibrary
  -
    name: AdminLog
    description: AdminLog
  -
    name: AdminMember
    description: AdminMember
  -
    name: AdminNotice
