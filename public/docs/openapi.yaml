openapi: 3.0.0
info:
  title: 'CI4 Board API'
  description: "CodeIgniter 4 기반 헤드리스 게시판 REST API\n\n## 인증\n로그인 후 발급된 `access_token`을 `Authorization: Bearer {token}` 헤더로 전달합니다.\n\n## 기본 응답 형식\n```json\n{ \"success\": true,  \"data\": {},   \"message\": \"\" }\n{ \"success\": false, \"data\": null, \"message\": \"에러 메시지\" }\n```\n\n## API 구조\n| 경로 접두사 | 설명 | 인증 |\n|------------|------|------|\n| `/api/v1/*` | 사용자·게시판·쪽지·CMS | JWT (일부 공개) |\n| `/api/admin/v1/*` | 관리자 전용 | Admin JWT (role: superadmin/manager) |"
  version: 2.0.0
servers:
  -
    url: 'http://localhost:8080'
    description: '개발 서버'
paths:
  /api/v1/auth/social/google:
    get:
      tags:
        - Auth
      summary: 'Google OAuth2 인증 시작'
      operationId: 1e603fc453b57358c1f07e0c91b09161
      responses:
        '302':
          description: 'Google 인증 페이지로 리다이렉트'
  /api/v1/auth/social/google/callback:
    get:
      tags:
        - Auth
      summary: 'Google OAuth2 콜백'
      operationId: 8e78e60115efcbb1174b7ce0c110a6c0
      parameters:
        -
          name: code
          in: query
          required: true
          schema:
            type: string
        -
          name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '소셜 로그인 성공 → JWT 발급'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /api/v1/auth/social/kakao:
    get:
      tags:
        - Auth
      summary: '카카오 OAuth2 인증 시작'
      operationId: 8ef1b75277a7d544886d1b532b2407fc
      responses:
        '302':
          description: '카카오 인증 페이지로 리다이렉트'
  /api/v1/auth/social/kakao/callback:
    get:
      tags:
        - Auth
      summary: '카카오 OAuth2 콜백'
      operationId: 942c865538da3570c0f921024afb4273
      responses:
        '200':
          description: '소셜 로그인 성공 → JWT 발급'
  /api/v1/auth/social/naver:
    get:
      tags:
        - Auth
      summary: '네이버 OAuth2 인증 시작'
      operationId: 2eaafd720da3571b1ed3f4f85bd2f315
      responses:
        '302':
          description: '네이버 인증 페이지로 리다이렉트'
  /api/v1/auth/social/naver/callback:
    get:
      tags:
        - Auth
      summary: '네이버 OAuth2 콜백'
      operationId: 38b644f0131bbdebfaba7d6d2660a05d
      responses:
        '200':
          description: '소셜 로그인 성공 → JWT 발급'
  /api/admin/v1/articles:
    get:
      tags:
        - AdminArticle
      summary: '게시글 목록 (전체 게시판)'
      operationId: 9e9fb88cec6b87444da581beb6e25c4e
      parameters:
        -
          name: keyword
          in: query
          schema:
            type: string
        -
          name: bbs_id
          in: query
          schema:
            type: string
        -
          name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: '게시글 목록'
      security:
        -
          BearerAuth: []
  '/api/admin/v1/articles/{idx}':
    get:
      tags:
        - AdminArticle
      summary: '게시글 상세'
      operationId: edac0d7dd93900d048af76c570834cbf
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '게시글 상세'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        -
          BearerAuth: []
    delete:
      tags:
        - AdminArticle
      summary: '게시글 삭제 (소프트 삭제)'
      operationId: c455c3a0483a7b3722f5f42e21bca95d
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '삭제 완료'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        -
          BearerAuth: []
  /api/admin/v1/auth/login:
    post:
      tags:
        - AdminAuth
      summary: '관리자 로그인'
      operationId: 65aa358efa84130cbceb62acb832e3f6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - login_id
                - password
              properties:
                login_id:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin1234
              type: object
      responses:
        '200':
          description: '관리자 JWT 발급'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTokenResponse'
        '401':
          description: '잘못된 자격증명'
  /api/admin/v1/auth/logout:
    post:
      tags:
        - AdminAuth
      summary: '관리자 로그아웃'
      operationId: ecd05ebef4a2ce3de002dfe4cbe833ef
      requestBody:
        content:
          application/json:
            schema:
              properties:
                refresh_token:
                  type: string
              type: object
      responses:
        '200':
          description: '로그아웃 성공'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  /api/admin/v1/boards:
    get:
      tags:
        - AdminBoard
      summary: '게시판 목록 + 설정'
      operationId: 8bd1a2575d712ad298b340481b204397
      responses:
        '200':
          description: '게시판 목록 및 권한 그룹 정보'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        -
          BearerAuth: []
  '/api/admin/v1/boards/{bbsId}':
    put:
      tags:
        - AdminBoard
      summary: '게시판 설정 저장'
      operationId: 4b56027f47c2ca7316fd650593fd7525
      parameters:
        -
          name: bbsId
          in: path
          required: true
          schema:
            type: string
          example: free
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                bbs_name:
                  type: string
                bbs_used:
                  type: boolean
                bbs_count_list_article:
                  type: integer
                  default: 15
                bbs_comment_used:
                  type: boolean
                view_list:
                  type: array
                  items: { type: string }
                view_article:
                  type: array
                  items: { type: string }
                write_article:
                  type: array
                  items: { type: string }
                write_comment:
                  type: array
                  items: { type: string }
              type: object
      responses:
        '200':
          description: '설정 저장 완료'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        -
          BearerAuth: []
  /api/admin/v1/cms/banners:
    get:
      tags:
        - AdminCMS
      summary: '배너 목록'
      operationId: b78654ed2d9b1de8a0f9e294de0c8d71
      parameters:
        -
          name: position
          in: query
          schema:
            type: string
      responses:
        '200':
          description: '배너 목록'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    post:
      tags:
        - AdminCMS
      summary: '배너 생성'
      operationId: 5527b3b7363d038f75aea37f8311e556
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - position
                - image_path
              properties:
                position:
                  type: string
                image_path:
                  type: string
                link_url:
                  type: string
                start_at:
                  description: '노출 시작 time()'
                  type: integer
                end_at:
                  description: '노출 종료 time()'
                  type: integer
                sequence:
                  type: integer
                  default: 0
                is_used:
                  type: boolean
                  default: true
              type: object
      responses:
        '201':
          description: '생성 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  '/api/admin/v1/cms/banners/{idx}':
    put:
      tags:
        - AdminCMS
      summary: '배너 수정'
      operationId: b408c03c0e4c65b1d949a30f73e381dc
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                position:
                  type: string
                image_path:
                  type: string
                link_url:
                  type: string
                start_at:
                  type: integer
                end_at:
                  type: integer
                sequence:
                  type: integer
                is_used:
                  type: boolean
              type: object
      responses:
        '200':
          description: '수정 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    delete:
      tags:
        - AdminCMS
      summary: '배너 삭제'
      operationId: 0a68138e9262b8a66a452c8fe741be6e
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '삭제 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  /api/admin/v1/cms/library/files:
    get:
      tags:
        - AdminFileLibrary
      summary: '파일 라이브러리 전체 목록'
      operationId: 6c0fa3145d85a9f1e49b12046cd835fd
      parameters:
        -
          name: page
          in: query
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          schema:
            type: integer
            default: 20
        -
          name: mime
          in: query
          description: 'MIME 타입 접두 일치'
          schema:
            type: string
        -
          name: source
          in: query
          schema:
            type: string
        -
          name: uploader_idx
          in: query
          schema:
            type: integer
        -
          name: date_from
          in: query
          description: '업로드 시작일'
          schema:
            type: string
        -
          name: date_to
          in: query
          description: '업로드 종료일'
          schema:
            type: string
        -
          name: is_public
          in: query
          schema:
            type: integer
            enum:
              - 0
              - 1
      responses:
        '200':
          description: '파일 목록'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    post:
      tags:
        - AdminFileLibrary
      summary: '파일 직접 업로드'
      operationId: 46ee6b4735d43e5aafdc77d688f0acad
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                is_public:
                  type: integer
                  default: 0
                  enum: [0, 1]
              type: object
      responses:
        '201':
          description: '업로드 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  '/api/admin/v1/cms/library/files/{idx}':
    get:
      tags:
        - AdminFileLibrary
      summary: '파일 단건 조회'
      operationId: b579234d36851f8fd89bf18dd510a6f0
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '파일 상세'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    put:
      tags:
        - AdminFileLibrary
      summary: '파일 메타 수정'
      operationId: d53c63eed30a61939d20246129a71327
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                alt_text:
                  type: string
                  nullable: true
                is_public:
                  type: integer
                  enum: [0, 1]
              type: object
      responses:
        '200':
          description: '수정 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    delete:
      tags:
        - AdminFileLibrary
      summary: '파일 삭제'
      operationId: e060d44550d778732e2c9a4b9a7934ed
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '삭제 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '409':
          description: '사용 중인 파일'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  /api/admin/v1/cms/menus:
    get:
      tags:
        - AdminCMS
      summary: '메뉴 트리 조회'
      operationId: 7f21d8307e6c5876e177583c4d633f53
      responses:
        '200':
          description: '메뉴 트리'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    post:
      tags:
        - AdminCMS
      summary: '메뉴 생성'
      operationId: c7157f1d4873d43cce09a13f69c100a0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - label
              properties:
                label:
                  type: string
                url:
                  type: string
                target:
                  type: string
                  default: _self
                  enum: [_self, _blank]
                parent_idx:
                  type: integer
                  nullable: true
                sequence:
                  type: integer
                  default: 0
                is_used:
                  type: boolean
                  default: true
              type: object
      responses:
        '201':
          description: '생성 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  /api/admin/v1/cms/menus/reorder:
    put:
      tags:
        - AdminCMS
      summary: '메뉴 순서 일괄 변경'
      description: "드래그앤드롭 순서 일괄 저장\n\nRequest Body: [{ \"idx\": 1, \"sequence\": 0, \"parent_idx\": null }, ...]"
      operationId: 862ad4f09df45b6ecac835f84743d3a9
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                properties:
                  idx: { type: integer }
                  sequence: { type: integer }
                  parent_idx: { type: integer, nullable: true }
                type: object
      responses:
        '200':
          description: '순서 저장 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  '/api/admin/v1/cms/menus/{idx}':
    put:
      tags:
        - AdminCMS
      summary: '메뉴 수정'
      operationId: 57f64375da3242009c0e9628a86190e3
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                label:
                  type: string
                url:
                  type: string
                target:
                  type: string
                  enum: [_self, _blank]
                parent_idx:
                  type: integer
                  nullable: true
                sequence:
                  type: integer
                is_used:
                  type: boolean
              type: object
      responses:
        '200':
          description: '수정 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    delete:
      tags:
        - AdminCMS
      summary: '메뉴 삭제'
      operationId: fad73f9c6281624b921e312218ef5a07
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '삭제 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  /api/admin/v1/cms/pages:
    get:
      tags:
        - AdminCMS
      summary: '페이지 목록'
      operationId: 0feaf6f8c6e9d0e9c53a2cba849a48e7
      parameters:
        -
          name: keyword
          in: query
          schema:
            type: string
        -
          name: status
          in: query
          schema:
            type: integer
            enum:
              - 0
              - 1
        -
          name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: '페이지 목록'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    post:
      tags:
        - AdminCMS
      summary: '페이지 생성'
      operationId: 5e272438ca287ffdcec4b52abaf10d6a
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - slug
                - title
                - contents
              properties:
                slug:
                  description: '영문 소문자·숫자·하이픈'
                  type: string
                  example: about-us
                title:
                  type: string
                contents:
                  type: string
                status:
                  type: integer
                  default: 0
                  enum: [0, 1]
              type: object
      responses:
        '201':
          description: '생성 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
  '/api/admin/v1/cms/pages/{idx}':
    get:
      tags:
        - AdminCMS
      summary: '페이지 단건 조회'
      operationId: 51e80d5a5eddd1e1c0896bf0e6a73896
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '페이지 상세'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    put:
      tags:
        - AdminCMS
      summary: '페이지 수정'
      operationId: d6e1bed710cfa5d48443f8cff04b1743
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                slug:
                  type: string
                title:
                  type: string
                contents:
                  type: string
                status:
                  type: integer
                  enum: [0, 1]
              type: object
      responses:
        '200':
          description: '수정 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        -
          BearerAuth: []
    delete:
      tags:
        - AdminCMS
      summary: '페이지 삭제'
      operationId: dce3f2f6732a11831ad8186ec467ee54
      parameters:
        -
          name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: '삭제 완료'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
