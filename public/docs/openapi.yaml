  # ================================================================
  # 관리자 API  /api/admin/v1/*
  # ================================================================

  # ────────────────────────────────────────────────────────────────
  # 관리자 인증
  # ────────────────────────────────────────────────────────────────

  /api/admin/v1/auth/login:
    post:
      tags: [Admin Auth]
      summary: 관리자 로그인
      description: |
        `tb_admin_users`에서 인증하며, JWT payload에 `role` 클레임이 포함됩니다.
        `role: superadmin` 또는 `manager`인 경우만 허용됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login_id, password]
              properties:
                login_id:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin1234
      responses:
        '200':
          description: 관리자 JWT 발급
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTokenResponse'
        '401':
          description: 잘못된 자격증명

  /api/admin/v1/auth/logout:
    post:
      tags: [Admin Auth]
      summary: 관리자 로그아웃
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 로그아웃 성공
        '401':
          $ref: '#/components/responses/Unauthorized'

