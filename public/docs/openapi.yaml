  /api/admin/v1/stats:
    get:
      tags: [Admin Stats]
      summary: 일별 통계 조회
      description: |
        `from`~`to` 범위의 일별 통계를 반환합니다.
        데이터 수집은 `php spark stats:collect` 커맨드로 실행합니다.
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
            example: '2026-06-01'
          description: '조회 시작일 (기본값: 30일 전)'
        - name: to
          in: query
          schema:
            type: string
            format: date
            example: '2026-06-30'
          description: '조회 종료일 (기본값: 오늘)'
      responses:
        '200':
          description: 일별 통계 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date
                      to:
                        type: string
                        format: date
                      stats:
                        type: array
                        items:
                          $ref: '#/components/schemas/StatDaily'

