openapi: 3.0.3
info:
  title: CI4 Board API
  version: 1.0.0
  description: |
    CodeIgniter 4 기반 헤드리스 게시판 REST API

    ## 인증
    로그인 후 발급된 `access_token`을 `Authorization: Bearer {token}` 헤더로 전달합니다.

    ## 기본 응답 형식
    ```json
    { "success": true, "data": {}, "message": "" }
    { "success": false, "data": null, "message": "에러 메시지" }
    ```

servers:
  - url: /api/v1
    description: 프론트엔드 API
  - url: /api/admin/v1
    description: 관리자 API

tags:
  - name: Auth
    description: 사용자 인증
  - name: Board
    description: 게시판
  - name: Article
    description: 게시글
  - name: Comment
    description: 댓글
  - name: File
    description: 파일 업로드/다운로드
  - name: Message
    description: 쪽지
  - name: Config
    description: 사이트 설정
  - name: CMS
    description: CMS (페이지·배너·팝업·메뉴)
  - name: Admin Auth
    description: 관리자 인증
  - name: Admin Board
    description: 관리자 게시판 관리
  - name: Admin Member
    description: 관리자 회원 관리
  - name: Admin Article
    description: 관리자 게시글 관리
  - name: Admin Setting
    description: 관리자 사이트 설정
  - name: Admin CMS
    description: 관리자 CMS 관리

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
        message:
          type: string
          nullable: true

    TokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                access_token:
                  type: string
                  example: eyJ0eXAiOiJKV1Qi...
                refresh_token:
                  type: string
                token_type:
                  type: string
                  example: Bearer
                expires_in:
                  type: integer
                  example: 3600
                user:
                  $ref: '#/components/schemas/UserSummary'

    UserSummary:
      type: object
      properties:
        idx:
          type: integer
        user_id:
          type: string
        nickname:
          type: string
        email:
          type: string
        group_idx:
          type: integer
        group_name:
          type: string

    Article:
      type: object
      properties:
        idx:
          type: integer
        bbs_idx:
          type: integer
        title:
          type: string
        contents:
          type: string
        comment_count:
          type: integer
        hit_count:
          type: integer
        timestamp_insert:
          type: integer
        nickname:
          type: string

    Comment:
      type: object
      properties:
        idx:
          type: integer
        article_idx:
          type: integer
        comment:
          type: string
        nickname:
          type: string
        timestamp_insert:
          type: integer

    Message:
      type: object
      properties:
        idx:
          type: integer
        sender_user_idx:
          type: integer
        receiver_user_idx:
          type: integer
        title:
          type: string
        contents:
          type: string
        is_read:
          type: integer
        timestamp_insert:
          type: integer

  responses:
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            success: false
            data: null
            message: 인증이 필요합니다.
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    ValidationError:
      description: 유효성 검사 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

# ============================================================
# PATHS
# ============================================================
paths:

  # ---- Auth ----

  /auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login_id, password]
              properties:
                login_id:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin1234
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: 잘못된 자격증명
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/register:
    post:
      tags: [Auth]
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, nickname, email, password, password2]
              properties:
                user_id:
                  type: string
                nickname:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                password2:
                  type: string
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 로그아웃 성공
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 액세스 토큰 갱신
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      token_type:
                        type: string
                      expires_in:
                        type: integer
        '401':
          description: 유효하지 않은 Refresh Token

  /auth/me:
    get:
      tags: [Auth]
      summary: 내 정보 조회
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 사용자 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/profile:
    put:
      tags: [Auth]
      summary: 프로필 수정
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                email:
                  type: string
      responses:
        '200':
          description: 수정 완료
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/withdraw:
    delete:
      tags: [Auth]
      summary: 회원 탈퇴
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 탈퇴 완료
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- Board ----

  /boards:
    get:
      tags: [Board]
      summary: 게시판 목록
      responses:
        '200':
          description: 게시판 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /boards/{bbsId}:
    get:
      tags: [Board]
      summary: 게시판 상세
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
            example: free
      responses:
        '200':
          description: 게시판 정보
        '404':
          $ref: '#/components/responses/NotFound'

  # ---- Article ----

  /boards/{bbsId}/articles:
    get:
      tags: [Article]
      summary: 게시글 목록
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: 게시글 목록
    post:
      tags: [Article]
      summary: 게시글 작성
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, contents]
              properties:
                title:
                  type: string
                contents:
                  type: string
                is_secret:
                  type: integer
                  enum: [0, 1]
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: 게시글 작성 완료
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /boards/{bbsId}/articles/{idx}:
    get:
      tags: [Article]
      summary: 게시글 상세
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 게시글 상세
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Article]
      summary: 게시글 수정 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, contents]
              properties:
                title:
                  type: string
                contents:
                  type: string
      responses:
        '200':
          description: 수정 완료
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Article]
      summary: 게시글 삭제 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료
        '403':
          $ref: '#/components/responses/Forbidden'

  # ---- Comment ----

  /boards/{bbsId}/articles/{articleIdx}/comments:
    get:
      tags: [Comment]
      summary: 댓글 목록
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 댓글 목록
    post:
      tags: [Comment]
      summary: 댓글 작성
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: string
      responses:
        '201':
          description: 댓글 작성 완료
        '401':
          $ref: '#/components/responses/Unauthorized'

  /boards/{bbsId}/articles/{articleIdx}/comments/{commentIdx}:
    put:
      tags: [Comment]
      summary: 댓글 수정 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
        - name: commentIdx
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: 수정 완료
    delete:
      tags: [Comment]
      summary: 댓글 삭제 (작성자만)
      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
        - name: articleIdx
          in: path
          required: true
          schema:
            type: integer
        - name: commentIdx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료

  # ---- File ----

  /files:
    post:
      tags: [File]
      summary: 파일 업로드
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [bbs_idx, article_idx]
              properties:
                bbs_idx:
                  type: integer
                article_idx:
                  type: integer
                attachments:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 최대 5개, 2MB/개, 허용 확장자 jpg·png·gif·pdf·doc·xls·zip 등
      responses:
        '201':
          description: 업로드 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      uploaded:
                        type: array
                        items:
                          type: object
                          properties:
                            idx:
                              type: integer
                            original_filename:
                              type: string
                            capacity:
                              type: integer
                      errors:
                        type: array
                        items:
                          type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: 허용되지 않는 파일 (확장자·크기 초과)

  /files/{idx}/download:
    get:
      tags: [File]
      summary: 파일 다운로드 (인증 불필요)
      parameters:
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 파일 스트림
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /files/{idx}:
    delete:
      tags: [File]
      summary: 파일 삭제 (소유자만)
      security:
        - BearerAuth: []
      parameters:
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료
        '403':
          $ref: '#/components/responses/Forbidden'

  /files/wysiwyg:
    post:
      tags: [File]
      summary: WYSIWYG 이미지 업로드
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: jpg·png·gif·webp, 5MB 이하
      responses:
        '200':
          description: 이미지 URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      url:
                        type: string
        '422':
          description: 유효하지 않은 이미지

  # ---- Message ----

  /messages/inbox:
    get:
      tags: [Message]
      summary: 받은 쪽지함
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: 받은 쪽지 목록
        '401':
          $ref: '#/components/responses/Unauthorized'

  /messages/sent:
    get:
      tags: [Message]
      summary: 보낸 쪽지함
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 보낸 쪽지 목록

  /messages/{idx}:
    get:
      tags: [Message]
      summary: 쪽지 상세 조회 (송·수신자만)
      security:
        - BearerAuth: []
      parameters:
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 쪽지 상세
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Message]
      summary: 쪽지 삭제 (송·수신자만)
      security:
        - BearerAuth: []
      parameters:
        - name: idx
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료

  /messages:
    post:
      tags: [Message]
      summary: 쪽지 보내기
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, contents]
              properties:
                to:
                  type: string
                  description: 수신자 user_id 또는 nickname
                title:
                  type: string
                contents:
                  type: string
      responses:
        '201':
          description: 발송 완료
        '404':
          description: 수신자 없음
        '422':
          description: 자신에게 발송 불가 또는 필수값 누락

  # ---- Config ----

  /config:
    get:
      tags: [Config]
      summary: 사이트 공개 설정 조회
      responses:
        '200':
          description: 사이트 설정

  # ---- CMS ----

  /cms/pages/{slug}:
    get:
      tags: [CMS]
      summary: CMS 페이지 조회
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            example: about-us
      responses:
        '200':
          description: 페이지 내용
        '404':
          $ref: '#/components/responses/NotFound'

  /cms/banners:
    get:
      tags: [CMS]
      summary: 배너 목록 조회
      responses:
        '200':
          description: 배너 목록

  /cms/popups:
    get:
      tags: [CMS]
      summary: 팝업 목록 조회
      responses:
        '200':
          description: 팝업 목록

  /cms/menus:
    get:
      tags: [CMS]
      summary: 메뉴 트리 조회
      responses:
        '200':
          description: 메뉴 트리 (children 포함)

  # ============================================================
  # Admin API (서버: /api/admin/v1)
  # ============================================================

  /auth/login_admin:
    post:
      tags: [Admin Auth]
      summary: 관리자 로그인
      servers:
        - url: /api/admin/v1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login_id, password]
              properties:
                login_id:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: 관리자 JWT 발급
        '401':
          description: 권한 없음 (그룹 idx=1 아닌 경우)

  /boards_admin:
    get:
      tags: [Admin Board]
      summary: 게시판 목록 + 설정
      servers:
        - url: /api/admin/v1
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 게시판 목록 및 그룹 정보

  /members:
    get:
      tags: [Admin Member]
      summary: 회원 목록
      servers:
        - url: /api/admin/v1
      security:
        - BearerAuth: []
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 회원 목록

  /setting:
    get:
      tags: [Admin Setting]
      summary: 사이트 설정 조회
      servers:
        - url: /api/admin/v1
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 사이트 설정
    put:
      tags: [Admin Setting]
      summary: 사이트 설정 수정
      servers:
        - url: /api/admin/v1
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                browser_title_fix_value:
                  type: string
                join_used:
                  type: boolean
                site_block_used:
                  type: boolean
                site_block_contents:
                  type: string
      responses:
        '200':
          description: 설정 저장 완료
