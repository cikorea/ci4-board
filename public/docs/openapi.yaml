      security:
        -
          BearerAuth: []
components:
  schemas:
    ApiResponse:
      properties:
        success:
          type: boolean
        data:
          nullable: true
        message:
          type: string
          nullable: true
      type: object
    TokenResponse:
      allOf:
        -
          $ref: '#/components/schemas/ApiResponse'
        -
          properties:
            data:
              properties:
                access_token:
                  type: string
                  example: eyJ0eXAiOiJKV1Qi...
                refresh_token:
                  type: string
                token_type:
                  type: string
                  example: Bearer
                expires_in:
                  type: integer
                  example: 3600
                user:
                  $ref: '#/components/schemas/UserSummary'
              type: object
          type: object
    AdminTokenResponse:
      allOf:
        -
          $ref: '#/components/schemas/ApiResponse'
        -
          properties:
            data:
              properties:
                access_token:
                  type: string
                refresh_token:
                  type: string
                token_type:
                  type: string
                  example: Bearer
                expires_in:
                  type: integer
                  example: 3600
                user:
                  $ref: '#/components/schemas/AdminUserSummary'
              type: object
          type: object
    UserSummary:
      properties:
        idx:
          type: integer
        user_id:
          type: string
        nickname:
          type: string
        email:
          type: string
        group_idx:
          type: integer
        group_name:
          type: string
      type: object
    AdminUserSummary:
      properties:
        idx:
          type: integer
        user_id:
          type: string
        nickname:
          type: string
        email:
          type: string
        role:
          type: string
          example: superadmin
          enum:
            - superadmin
            - manager
      type: object
    Article:
      properties:
        idx:
          type: integer
        bbs_idx:
          type: integer
        title:
          type: string
        contents:
          type: string
        comment_count:
          type: integer
        hit_count:
          type: integer
        timestamp_insert:
          type: integer
        nickname:
          type: string
      type: object
    Comment:
      properties:
        idx:
          type: integer
        article_idx:
          type: integer
        comment:
          type: string
        nickname:
          type: string
        timestamp_insert:
          type: integer
      type: object
    Message:
      properties:
        idx:
          type: integer
        sender_user_idx:
          type: integer
        receiver_user_idx:
          type: integer
        title:
          type: string
        contents:
          type: string
        is_read:
          type: integer
        timestamp_insert:
          type: integer
      type: object
    AdminLog:
      properties:
        idx:
          type: integer
        admin_idx:
          type: integer
        action:
          type: string
          example: board.update
        target_table:
          type: string
          nullable: true
        target_idx:
          type: integer
          nullable: true
        before_data:
          type: string
          nullable: true
        after_data:
          type: string
          nullable: true
        client_ip:
          type: string
        timestamp:
          type: integer
      type: object
    AdminNotice:
      properties:
        idx:
          type: integer
        title:
          type: string
        contents:
          type: string
          nullable: true
        author_idx:
          type: integer
        is_pinned:
          type: integer
          enum:
            - 0
            - 1
        timestamp_insert:
          type: integer
      type: object
    StatDaily:
      properties:
        idx:
          type: integer
        stat_date:
          type: string
          format: date
          example: '2026-06-01'
        new_users:
          type: integer
        new_articles:
          type: integer
        new_comments:
          type: integer
        total_hits:
          type: integer
        active_users:
          type: integer
      type: object
    Pagination:
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer
      type: object
  responses:
    NotFound:
      description: '리소스를 찾을 수 없습니다.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Unauthorized:
      description: '인증이 필요합니다.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Forbidden:
      description: '접근 권한이 없습니다.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    ValidationError:
      description: '유효성 검사 오류입니다.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
  securitySchemes:
    BearerAuth:
      type: http
      description: 'JWT Bearer token'
      bearerFormat: JWT
      scheme: bearer
