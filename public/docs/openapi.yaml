      security:
        - BearerAuth: []
      parameters:
        - name: bbsId
          in: path
          required: true
          schema:
            type: string
            example: free
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bbs_name:
                  type: string
                bbs_used:
                  type: boolean
                bbs_count_list_article:
                  type: integer
                  default: 15
                bbs_comment_used:
                  type: boolean
                view_list:
                  type: array
                  items:
                    type: string
                  description: 열람 허용 group_idx 목록
                view_article:
                  type: array
                  items:
                    type: string
                write_article:
                  type: array
                  items:
                    type: string
                write_comment:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 설정 저장 완료
        '404':
          $ref: '#/components/responses/NotFound'

