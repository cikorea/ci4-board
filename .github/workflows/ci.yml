name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: PHPUnit + PHPStan
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ci4_board_test
          MYSQL_USER: ci4user
          MYSQL_PASSWORD: ci4pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, mysqli, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy env
        run: |
          cp env .env
          sed -i 's/# CI_ENVIRONMENT = production/CI_ENVIRONMENT = development/' .env
          sed -i 's/# database.default.hostname = localhost/database.default.hostname = 127.0.0.1/' .env
          sed -i 's/# database.default.database = ci4/database.default.database = ci4_board_test/' .env
          sed -i 's/# database.default.username = root/database.default.username = ci4user/' .env
          sed -i 's/# database.default.password = root/database.default.password = ci4pass/' .env
          sed -i 's/# jwt.secret = your-secret-key-change-this-in-production/jwt.secret = ci-test-secret-key-minimum-32-chars-long/' .env
          echo "database.admin.hostname = 127.0.0.1"          >> .env
          echo "database.admin.database = codeigniter_admin_test" >> .env
          echo "database.admin.username = ci4user"             >> .env
          echo "database.admin.password = ci4pass"             >> .env
          echo "database.admin.DBDriver = MySQLi"              >> .env

      - name: Create admin test DB
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "
            CREATE DATABASE IF NOT EXISTS \`codeigniter_admin_test\`
              CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            GRANT ALL PRIVILEGES ON \`codeigniter_admin_test\`.* TO 'ci4user'@'%';
            FLUSH PRIVILEGES;
          "

      - name: Run service migrations on test DB
        run: |
          php -r "
          define('FCPATH', __DIR__ . '/public/');
          \$_SERVER['CI_ENVIRONMENT'] = 'testing';
          require 'vendor/codeigniter4/framework/system/Test/bootstrap.php';
          \$runner = \Config\Services::migrations();
          \$runner->setNamespace(null);
          \$runner->latest('tests');
          echo 'Service DB migrations done' . PHP_EOL;
          "

      - name: Create admin DB tables (codeigniter_admin_test)
        run: |
          mysql -h 127.0.0.1 -u ci4user -pci4pass codeigniter_admin_test <<'SQL'
          CREATE TABLE IF NOT EXISTS `tb_admin_users` (
            `idx`                    int unsigned  NOT NULL AUTO_INCREMENT,
            `user_id`                varchar(64)   NOT NULL,
            `super_secured_password` varchar(255)  NOT NULL,
            `name`                   varchar(64)   NOT NULL DEFAULT '',
            `nickname`               varchar(64)   NOT NULL DEFAULT '',
            `email`                  varchar(128)  NOT NULL DEFAULT '',
            `role`                   varchar(32)   NOT NULL DEFAULT 'manager',
            `status`                 tinyint(1)    NOT NULL DEFAULT 1,
            `timestamp_insert`       int unsigned  NOT NULL DEFAULT 0,
            `timestamp_update`       int unsigned  DEFAULT NULL,
            `timestamp_login`        int unsigned  DEFAULT NULL,
            `client_ip_insert`       varchar(64)   NOT NULL DEFAULT '',
            `client_ip_login`        varchar(64)   NOT NULL DEFAULT '',
            PRIMARY KEY (`idx`),
            UNIQUE KEY `uq_admin_users__user_id` (`user_id`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `tb_admin_notice` (
            `idx`              int unsigned NOT NULL AUTO_INCREMENT,
            `title`            varchar(255) NOT NULL,
            `contents`         text         DEFAULT NULL,
            `author_idx`       int unsigned NOT NULL,
            `is_pinned`        tinyint(1)   NOT NULL DEFAULT 0,
            `timestamp_insert` int unsigned NOT NULL,
            PRIMARY KEY (`idx`),
            KEY `idx_admin_notice__author_idx` (`author_idx`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `tb_admin_log` (
            `idx`          int unsigned  NOT NULL AUTO_INCREMENT,
            `admin_idx`    int unsigned  NOT NULL,
            `action`       varchar(64)   NOT NULL,
            `target_table` varchar(64)   DEFAULT NULL,
            `target_idx`   int unsigned  DEFAULT NULL,
            `before_data`  json          DEFAULT NULL,
            `after_data`   json          DEFAULT NULL,
            `client_ip`    varchar(64)   NOT NULL DEFAULT '',
            `user_agent`   varchar(255)  DEFAULT NULL,
            `timestamp`    int unsigned  NOT NULL,
            PRIMARY KEY (`idx`),
            KEY `idx_admin_log__admin_idx` (`admin_idx`),
            KEY `idx_admin_log__action` (`action`),
            KEY `idx_admin_log__timestamp` (`timestamp`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `tb_admin_session` (
            `idx`           int unsigned NOT NULL AUTO_INCREMENT,
            `admin_idx`     int unsigned NOT NULL,
            `access_token`  varchar(512) NOT NULL,
            `refresh_token` varchar(512) NOT NULL,
            `expires_at`    int unsigned NOT NULL,
            `client_ip`     varchar(64)  NOT NULL DEFAULT '',
            `created_at`    int unsigned NOT NULL,
            `revoked`       tinyint(1)   NOT NULL DEFAULT 0,
            PRIMARY KEY (`idx`),
            KEY `idx_admin_session__admin_idx` (`admin_idx`),
            KEY `idx_admin_session__refresh_token` (`refresh_token`(64))
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `tb_site_config` (
            `idx`          int unsigned NOT NULL AUTO_INCREMENT,
            `config_key`   varchar(128) NOT NULL,
            `config_value` text         DEFAULT NULL,
            `description`  varchar(255) DEFAULT NULL,
            `updated_by`   int unsigned DEFAULT NULL,
            `updated_at`   int unsigned DEFAULT NULL,
            PRIMARY KEY (`idx`),
            UNIQUE KEY `uq_site_config__config_key` (`config_key`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `tb_stats_daily` (
            `idx`           int unsigned NOT NULL AUTO_INCREMENT,
            `stat_date`     date         NOT NULL,
            `new_users`     int unsigned NOT NULL DEFAULT 0,
            `new_articles`  int unsigned NOT NULL DEFAULT 0,
            `new_comments`  int unsigned NOT NULL DEFAULT 0,
            `total_hits`    int unsigned NOT NULL DEFAULT 0,
            `active_users`  int unsigned NOT NULL DEFAULT 0,
            `created_at`    int unsigned NOT NULL,
            PRIMARY KEY (`idx`),
            UNIQUE KEY `uq_stats_daily__stat_date` (`stat_date`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          INSERT IGNORE INTO `tb_admin_users`
            (user_id, super_secured_password, name, nickname, email, role, status, timestamp_insert, client_ip_insert)
          VALUES
            ('admin', '$2y$10$KWBtrJdLYO1SnoqByIdv4uh2mcybue05.hbndjORkktBErGnPJxOe',
             '관리자', 'admin', 'admin@localhost', 'superadmin', 1, UNIX_TIMESTAMP(), '127.0.0.1');
          SQL

      - name: Run PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --level=3

      - name: Validate OpenAPI spec
        run: php spark swagger:generate --validate

      - name: Run PHPUnit
        run: php vendor/bin/phpunit --testdox
        env:
          CI: true
